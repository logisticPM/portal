name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type safety — authoritative gate.
      - name: Typecheck
        run: npm run typecheck

      # Lint. NOTE: requires ESLint configured (`next lint`). If the repo has no
      # ESLint config yet, either run `npx next lint` once locally to scaffold it
      # (commit eslint-config-next + .eslintrc.json), or remove this step.
      - name: Lint
        run: npm run lint

      # Production build — catches RSC/route errors CI must not miss.
      # Runs on the in-memory mock (no AWS creds needed in CI).
      - name: Build
        run: npm run build
        env:
          REPO_IMPL: mock
